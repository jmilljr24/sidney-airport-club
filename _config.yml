title: "Sidney Airport Club"

plugins:
  - jekyll-inline-svg

collections:
  meetings:
    output: true
    permalink: /meetings/:path/
  events:
    output: true
    permalink: /events/:path/

future: true

defaults:
  - scope:
      path: ""
      type: "meetings"
    values:
      layout: "meeting"
  - scope:
      path: ""
      type: "events"
    values:
      layout: "event"

exclude:
  - package.json
  - postcss.config.js
  - tailwind.config.js
  - package-lock.json
  - assets/css/tailwind-input.css
