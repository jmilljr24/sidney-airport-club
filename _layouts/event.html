---
layout: default
---
<article class="max-w-4xl mx-auto px-4 py-8">
  <header class="mb-8 border-b border-gray-200 pb-6">
    <h1 class="text-3xl font-bold text-gray-900 mb-3">
      {{ page.title }}
    </h1>
    <p class="text-lg text-gray-600 flex items-center">
      <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
      </svg>
      {{ page.date | date: "%B %d, %Y" }}
    </p>
    {% if page.location %}
      <p class="text-lg text-gray-600 flex items-center">
        <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
        {{ page.location }}
      </p>
    {% endif %}
  </header>
  
  <div class="event-content bg-white rounded-lg border border-gray-200 p-6">
    <div class="prose prose-lg max-w-none">
      {{ content }}
    </div>
  </div>
  
  <footer class="mt-8 pt-6 border-t border-gray-200">
    <a href="/events.html" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium transition-colors duration-200">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to all events
    </a>
  </footer>
</article>
